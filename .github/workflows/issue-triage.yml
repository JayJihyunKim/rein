name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto-label issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();

            const labels = [];

            // 버그 감지
            if (title.includes('bug') || title.includes('error') || 
                title.includes('broken') || body.includes('재현')) {
              labels.push('bug');
            }

            // 기능 요청 감지
            if (title.includes('feat') || title.includes('feature') ||
                title.includes('기능') || title.includes('추가')) {
              labels.push('enhancement');
            }

            // 문서 관련
            if (title.includes('doc') || title.includes('문서') || 
                title.includes('readme')) {
              labels.push('documentation');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }

            // SOT/incidents 후보 안내 코멘트 (bug인 경우)
            if (labels.includes('bug')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '🤖 이 이슈는 버그로 분류되었습니다.\n\n재현이 확인되면 `SOT/incidents/INC-NNN.md`에 기록해 주세요.'
              });
            }
