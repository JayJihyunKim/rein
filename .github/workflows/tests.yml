name: tests

# rein-dev 메인테이너 전용 테스트 워크플로우.
# plugin marketplace 흐름 (`/plugin install rein@rein`) 로 사용자가 받는 파일에
# 포함되지 않는다 (branch-strategy.md 의 "tests/** 는 main 제외" 정책).
# mirror-to-public.yml 이 이 파일을 public rein 레포로 전송하기 전에
# strip 하여 이중 방어.
#
# 수동 실행 전용. 내부 governance + plugin consistency 테스트가 일반 push/PR
# 신호를 오염시키지 않도록 자동 CI 에서는 실행하지 않는다.

on:
  workflow_dispatch:

jobs:
  # Primary matrix: rein 이 공식 지원하는 플랫폼.
  # ubuntu-latest 는 Linux + WSL2 환경을 대변한다.
  tests:
    # 외부로 포크/복제된 저장소에서는 돌지 않도록 방어.
    if: github.repository == 'JayJihyunKim/rein-dev'
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          bash --version
          python3 --version
          uname -a

      - name: Run hook tests
        run: bash tests/hooks/run-all.sh

      - name: Run script tests
        run: bash tests/scripts/run-all.sh

  # Phase 9 Task 9.1 — dual-mode smoke matrix.
  # Advisory: Windows native (Git Bash shell). Rein 은 Windows 에서 WSL2 사용을
  # 권장하므로 native 실패가 릴리스를 막지 않는다. 단, 호환성 회귀 탐지용.
  tests-windows-advisory:
    if: github.repository == 'JayJihyunKim/rein-dev'
    name: tests (windows-latest, advisory)
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          bash --version
          python3 --version || python --version
          uname -a

      - name: Probe Python launcher (advisory)
        id: probe_py
        shell: bash
        run: |
          if command -v py >/dev/null 2>&1; then
            echo "py_present=1" >> "$GITHUB_OUTPUT"
          else
            echo "py_present=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Python runtime (advisory)
        if: steps.probe_py.outputs.py_present == '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Simulate WindowsApps stub (advisory)
        shell: bash
        env:
          FAKE_PY_DIR: ${{ runner.temp }}/fake-python
        run: |
          mkdir -p "$FAKE_PY_DIR"
          cat > "$FAKE_PY_DIR/python3" <<'SH'
          #!/usr/bin/env bash
          exit 49
          SH
          chmod +x "$FAKE_PY_DIR/python3"
          # PATH 오염 전에 real python 경로를 캡처해서 REIN_TEST_REAL_PY 로 전달.
          # 이렇게 하지 않으면 테스트 내부의 `command -v python3` 가 fake stub 을 잡아
          # fake-py-launcher 시나리오 등이 오염된다 (Codex final review C3).
          REAL_PY=$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)
          # resolver 는 fake stub 를 skip 후 python (setup-python) 또는 py -3 로 fallback
          PATH="$FAKE_PY_DIR:$PATH" REIN_TEST_REAL_PY="$REAL_PY" \
            bash tests/hooks/test-python-runner.sh

      - name: Run hook tests (advisory)
        run: bash tests/hooks/run-all.sh

      - name: Run script tests (advisory)
        run: bash tests/scripts/run-all.sh
