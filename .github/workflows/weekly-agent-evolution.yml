name: Weekly Agent Evolution

on:
  schedule:
    - cron: '0 10 * * 1'  # 매주 월요일 10:00 UTC
  workflow_dispatch:

jobs:
  weekly-evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count incidents by type
        run: |
          echo "=== Weekly Agent Evolution Check ==="
          echo "날짜: $(date '+%Y-%m-%d')"

          total=$(find trail/incidents -name "INC-*.md" 2>/dev/null | wc -l)
          echo "전체 incident 수: $total"

          if [ "$total" -ge 3 ]; then
            echo "💡 incident가 3개 이상입니다."
            echo "   incidents-to-agent skill 실행을 고려하세요:"
            echo "   '최근 incidents에서 새 agent 필요성 판단해줘'"
          fi

      - name: Check agent candidates
        run: |
          candidates=$(find trail/agent-candidates -name "*.md" 2>/dev/null | grep -v ".gitkeep" | wc -l)
          echo "대기 중인 에이전트 후보: $candidates개"
          if [ "$candidates" -gt 0 ]; then
            echo "⚠️  승인 대기 중인 에이전트 후보가 있습니다:"
            find trail/agent-candidates -name "*.md" 2>/dev/null | grep -v ".gitkeep"
          fi

      - name: Check stale draft agents
        run: |
          stale=$(find .claude/agents -name "*.md.draft" -mtime +14 2>/dev/null | wc -l)
          if [ "$stale" -gt 0 ]; then
            echo "⚠️  2주 이상 된 draft 에이전트가 $stale개 있습니다. 활성화 또는 삭제하세요."
          fi
