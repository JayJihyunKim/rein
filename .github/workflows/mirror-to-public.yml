name: Mirror main to public repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    # Defense-in-depth: if this workflow leaks into another repo (via
    # "Use this template", fork, or accidental copy), refuse to run.
    # Only the canonical maintainer repo should mirror to public rein.
    if: github.repository == 'JayJihyunKim/rein-dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Strip maintainer-only files and force push to public
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Strip the mirror workflow itself — it must exist on rein-dev main
          # (so this workflow triggers on push) but should NOT appear in the
          # public rein repo.
          if [ -f .github/workflows/mirror-to-public.yml ]; then
            git rm -q .github/workflows/mirror-to-public.yml
            git commit -m "chore: strip maintainer-only mirror workflow for public"
          fi

          # Strip maintainer-only tests workflow. `tests.yml` runs the
          # internal test harness and references tests/** which is also
          # excluded from main (branch-strategy.md). Defense-in-depth:
          # if it ever lands on main by accident, don't leak to public.
          if [ -f .github/workflows/tests.yml ]; then
            git rm -q .github/workflows/tests.yml
            git commit -m "chore: strip maintainer-only tests workflow for public"
          fi

          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/JayJihyunKim/rein.git
          git push public HEAD:main --force
          git push public --tags --force
