name: Mirror main to public repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    # Defense-in-depth: if this workflow leaks into another repo (via
    # "Use this template", fork, or accidental copy), refuse to run.
    # Only the canonical maintainer repo should mirror to public rein.
    if: github.repository == 'JayJihyunKim/rein-dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Strip maintainer-only files and force push to public
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Strip the mirror workflow itself — it must exist on rein-dev main
          # (so this workflow triggers on push) but should NOT appear in the
          # public rein repo.
          if [ -f .github/workflows/mirror-to-public.yml ]; then
            git rm -q .github/workflows/mirror-to-public.yml
            git commit -m "chore: strip maintainer-only mirror workflow for public"
          fi

          # Strip maintainer-only tests workflow. `tests.yml` runs the
          # internal test harness and references tests/** which is also
          # excluded from main (branch-strategy.md). Defense-in-depth:
          # if it ever lands on main by accident, don't leak to public.
          if [ -f .github/workflows/tests.yml ]; then
            git rm -q .github/workflows/tests.yml
            git commit -m "chore: strip maintainer-only tests workflow for public"
          fi

          # Strip maintainer-only govcheck workflow. `govcheck.yml` validates
          # the rein-dev governance surface (AGENTS.md, hooks, scripts/rein-*).
          # It is not useful in user projects (branch-strategy.md §
          # Phase 1.2 rationale). Defense-in-depth mirror of the Plan A
          # decision to keep govcheck dev-only.
          if [ -f .github/workflows/govcheck.yml ]; then
            git rm -q .github/workflows/govcheck.yml
            git commit -m "chore: strip maintainer-only govcheck workflow for public"
          fi

          # Strip maintainer-only plugin-drift-check workflow. Verifies that
          # plugins/rein-core/ ↔ .claude/ stay sha256-identical — only meaningful
          # on rein-dev where the dual tree exists. Public rein repo has the
          # plugin tarball only.
          if [ -f .github/workflows/plugin-drift-check.yml ]; then
            git rm -q .github/workflows/plugin-drift-check.yml
            git commit -m "chore: strip maintainer-only plugin-drift-check workflow for public"
          fi

          # Strip maintainer-only daily-trail-audit workflow. Operates on the
          # rein-dev trail/ skeleton; public repo has no trail/ to audit.
          if [ -f .github/workflows/daily-trail-audit.yml ]; then
            git rm -q .github/workflows/daily-trail-audit.yml
            git commit -m "chore: strip maintainer-only daily-trail-audit workflow for public"
          fi

          # Strip maintainer-only repo-audit workflow. Internal governance
          # audit job, not user-facing.
          if [ -f .github/workflows/repo-audit.yml ]; then
            git rm -q .github/workflows/repo-audit.yml
            git commit -m "chore: strip maintainer-only repo-audit workflow for public"
          fi

          # Strip maintainer-only weekly-agent-evolution workflow. Rein-dev
          # agent-candidates promotion pipeline, not user-facing.
          if [ -f .github/workflows/weekly-agent-evolution.yml ]; then
            git rm -q .github/workflows/weekly-agent-evolution.yml
            git commit -m "chore: strip maintainer-only weekly-agent-evolution workflow for public"
          fi

          # Strip trail/ from public mirror.
          # Per v1.2.0 cycle F10 (branch-strategy.md "특수 처리" 절,
          # 2026-05-14 갱신): trail/ is now legitimately shipped on main as
          # maintainer dogfood operational data (dod/inbox/index/stamps) — this
          # resolved the bootstrap-check hook false-positive that blocked
          # maintainer release path when main lacked trail/. However, public
          # rein repo (general user-facing) MUST NOT expose maintainer
          # operational records (codex-reviewed stamps, incident logs, etc.),
          # so this strip step is retained as the public-facing boundary.
          # S30 — explicit name-level strip of blocks log files runs BEFORE the
          # trail/ subtree strip so the workflow source carries explicit
          # `git rm trail/incidents/blocks.<X>` lines that are grep-discoverable
          # (plan A.9.1/C.3.1 grep contract verifies 3 separate lines).
          # `|| true` makes the lines a safe no-op when the files are absent.
          git rm -qf trail/incidents/blocks.jsonl 2>/dev/null || true
          git rm -qf trail/incidents/blocks.log 2>/dev/null || true
          git rm -qf trail/incidents/blocks.log.legacy 2>/dev/null || true

          # Strip .rein/ subtree (F12 boundary, 2026-05-14): .rein/project.json
          # is shipped on main as the BG-1 bootstrap-check marker, but the
          # entire .rein/ directory (including project.json + cache + policy)
          # is maintainer-only operational state. Public mirror has no use
          # for it. plugin tarball does not include .rein/ either (it lives
          # outside plugins/rein-core/), so this strip is the public-facing
          # boundary mirroring F10's trail/ pattern.
          if [ -d .rein ]; then
            git rm -rqf .rein
          fi

          # Strip trail/ subtree (F10 boundary: maintainer-only operational
          # data does not appear in the public mirror, even though it ships
          # to main for the hook bootstrap-check contract).
          if [ -d trail ]; then
            git rm -rqf trail
          fi

          # Single commit covers blocks-log + trail/ stripping when either staged something.
          if ! git diff --cached --quiet; then
            git commit -m "chore: strip trail/ skeleton + explicit blocks logs (S30) for public"
          fi

          # Q9 mitigation (v1.0.3+): identify any tags that pointed at the
          # original pre-strip push HEAD (GITHUB_SHA). The strip step above
          # advanced HEAD via N maintainer-only strip commits — any release
          # tag pushed atomically with this main push still points at the
          # original (unstripped) commit. Force re-tag onto the stripped
          # HEAD so the public release tarball is generated from the clean
          # tree. Pre-v1.0.3 tags (v1.0.0/v1.0.1/v1.0.2) are NOT retroactively
          # re-tagged here — they remain as-is on public per the v1.0.3 spec
          # decision (out-of-scope retag).
          ORIG_SHA="${{ github.sha }}"
          ATTACHED_TAGS=$(git tag --points-at "$ORIG_SHA")
          if [ -n "$ATTACHED_TAGS" ]; then
            for tag in $ATTACHED_TAGS; do
              # Preserve the original annotated tag message + force retag.
              msg=$(git tag -l --format='%(contents)' "$tag")
              git tag -f -a "$tag" -m "$msg"
            done
          fi

          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/JayJihyunKim/rein.git
          git push public HEAD:main --force
          # Push only the re-tagged tags (Q9). The previous `--tags --force`
          # form would have pushed all local tags including pre-strip tag
          # trees — that was the leak source. Pre-v1.0.3 tags already on
          # public remain untouched (no force-overwrite).
          if [ -n "$ATTACHED_TAGS" ]; then
            for tag in $ATTACHED_TAGS; do
              git push public "$tag" --force
            done
          fi
