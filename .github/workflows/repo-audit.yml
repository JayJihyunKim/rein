name: Weekly Repo Audit

on:
  schedule:
    - cron: '0 11 * * 1'  # 매주 월요일 11:00 UTC
  workflow_dispatch:

jobs:
  repo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit AGENTS.md size
        run: |
          echo "=== Repo Audit ==="
          lines=$(wc -l < AGENTS.md)
          echo "AGENTS.md 줄 수: $lines"
          if [ "$lines" -gt 150 ]; then
            echo "⚠️  AGENTS.md가 너무 깁니다 ($lines줄). 불필요한 규칙을 제거하세요."
          fi

      - name: Check registry consistency
        run: |
          echo "--- Registry 일관성 확인 ---"
          # agents.yml에 등록된 에이전트와 실제 파일 비교
          if [ -f .claude/registry/agents.yml ]; then
            echo "registry/agents.yml 존재 확인"
          else
            echo "⚠️  registry/agents.yml이 없습니다!"
          fi

          # 실제 agents 파일 목록
          echo "현재 agent 파일 목록:"
          ls .claude/agents/*.md 2>/dev/null | grep -v ".draft" || echo "  (없음)"

      - name: Security check
        run: |
          echo "--- 보안 점검 ---"
          # .env 파일이 Git에 추적되는지 확인
          if git ls-files | grep -q "^.env"; then
            echo "🚨 CRITICAL: .env 파일이 Git에 추적되고 있습니다!"
            exit 1
          fi
          echo "✅ .env 파일 미추적 확인"

          # secrets 폴더 확인
          if git ls-files | grep -q "^secrets/"; then
            echo "🚨 CRITICAL: secrets/ 폴더가 Git에 추적되고 있습니다!"
            exit 1
          fi
          echo "✅ secrets/ 폴더 미추적 확인"
