# agents.yml — 활성 에이전트 레지스트리
# 새 에이전트는 promote-agent 프로세스를 거쳐 사람이 승인한 후에만 추가한다.

agents:
  - name: feature-builder
    status: active
    role: "기존 코드베이스에 새 기능을 추가하거나, 버그를 수정하거나, 새 모듈·서비스 초기 스캐폴딩을 수행한다"
    file: ".claude/agents/feature-builder.md"
    triggers: [add-feature workflow, fix-bug workflow, build-from-scratch workflow]
    added: "2026-03-17"

  - name: researcher
    status: active
    role: "기술 결정을 위한 정보를 조사하고 구조화된 결과를 제공한다"
    file: ".claude/agents/researcher.md"
    triggers: [research-task workflow]
    added: "2026-03-17"

  - name: docs-writer
    status: active
    role: "코드베이스의 문서를 작성하고 최신 상태로 유지한다"
    file: ".claude/agents/docs-writer.md"
    triggers: [문서 작성/업데이트 요청]
    added: "2026-03-17"

  - name: plan-writer
    status: active
    role: "design → plan 변환 전담. coverage 매트릭스 + covers 메타데이터 생성 + validator 통과."
    file: ".claude/agents/plan-writer.md"
    triggers: [design-review-passed, plan-writing-request]
    added: "2026-04-19"

# candidates: []   # 승인 대기 에이전트
# inactive: []     # 비활성 에이전트 (히스토리 보존)
