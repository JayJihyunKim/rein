# Smart Router — 학습 캐시
# 이 파일은 사전 등록된 카탈로그가 아니다.
# 라우터가 동적으로 발견한 항목의 학습 데이터(피드백, 보정)를 저장한다.
#
# 동적 발견 방식:
#   - 프로젝트 에이전트: .claude/agents/*.md 스캔
#   - 스킬: 세션 컨텍스트의 "skills are available" 목록에서 발견
#   - MCP: 세션 컨텍스트의 "deferred tools" 목록에서 mcp__ 접두사로 발견
#
# 이 파일에 항목이 있으면: 과거 피드백 기반 보정 데이터를 매칭에 반영
# 이 파일에 항목이 없으면: description 텍스트를 실시간 분석하여 매칭

# ============================================================
# 프로세스 스킬 제외 목록
# 아래 패턴의 스킬은 기존 흐름이 제어하므로 라우팅 추천에서 제외한다.
# ============================================================
excluded_patterns:
  - "superpowers:brainstorming"
  - "superpowers:writing-plans"
  - "superpowers:executing-plans"
  - "superpowers:verification-before-completion"
  - "superpowers:using-superpowers"
  - "superpowers:using-git-worktrees"
  - "superpowers:finishing-a-development-branch"
  - "superpowers:requesting-code-review"
  - "superpowers:receiving-code-review"
  - "superpowers:dispatching-parallel-agents"
  - "superpowers:subagent-driven-development"

# ============================================================
# 학습된 보정 데이터
# 사용자 피드백과 성공/실패 이력에서 자동으로 축적된다.
# 수동 편집하지 않는다 — 라우터가 자동으로 관리한다.
# ============================================================
learned_preferences: []
