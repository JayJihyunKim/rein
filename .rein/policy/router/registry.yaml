# Smart Router — 학습 캐시
# 이 파일은 사전 등록된 카탈로그가 아니다.
# 라우터가 동적으로 발견한 항목의 학습 데이터(피드백, 보정)를 저장한다.
#
# 동적 발견 방식:
#   - 프로젝트 에이전트: .claude/agents/*.md 스캔
#   - 스킬: 세션 컨텍스트의 "skills are available" 목록에서 발견
#   - MCP: 세션 컨텍스트의 "deferred tools" 목록에서 mcp__ 접두사로 발견
#
# 이 파일에 항목이 있으면: 과거 피드백 기반 보정 데이터를 매칭에 반영
# 이 파일에 항목이 없으면: description 텍스트를 실시간 분석하여 매칭

# ============================================================
# 프로세스 스킬 제외 목록
# 라우팅 추천에서 제외할 프로세스 스킬을 식별하는 방식:
#   1) description_keywords — 스킬 description 텍스트에 포함되면 제외 (기본)
#   2) id_globs — id 를 직접 지정해야 하는 경우 glob 패턴으로 fallback
# 외부 플러그인 네임스페이스(superpowers 등)에 하드코딩하지 않는다.
# ============================================================
excluded_patterns:
  description_keywords:
    - "Use when starting any conversation"    # using-superpowers 류
    - "implementation plan"                   # writing-plans 류
    - "execute.*plan"                         # executing-plans 류
    # "brainstorm" keyword 는 제외하지 않는다 — rein-native brainstorming
    # skill 이 자동 추천 대상이어야 하기 때문. superpowers:brainstorming 같은
    # 외부 중복은 아래 id_globs 에서 처리한다.
    - "verify.*completion"                    # verification-before-completion 류
    - "code review"                           # requesting-/receiving-code-review 류
    - "worktree"                              # using-git-worktrees 류
    - "finishing.*development"                # finishing-a-development-branch 류
    - "dispatching.*parallel"                 # dispatching-parallel-agents 류
    - "subagent-driven"                       # subagent-driven-development 류
  # id_globs: 외부 플러그인에서 오는 중복 스킬을 id prefix 로 제외.
  # rein-native skill (.claude/skills/*) 과 기능이 겹치면 rein-native 우선.
  id_globs:
    - "superpowers:brainstorming"             # rein-native brainstorming 우선
    - "superpowers:brainstorm"                # deprecated alias
    - "superpowers:writing-plans"             # rein-native writing-plans 우선
    - "superpowers:write-plan"                # deprecated alias

# ============================================================
# 학습된 보정 데이터
# 사용자 피드백과 성공/실패 이력에서 자동으로 축적된다.
# 수동 편집하지 않는다 — 라우터가 자동으로 관리한다.
# ============================================================
learned_preferences: []
# 예시:
# - id: "skill:python-pro"
#   boost: 0.2           # 이 항목의 매칭 점수에 가산
#   context: "*.py 파일 작업 시 사용자가 반복 선택"
#   last_updated: 2026-04-09
#
# - id: "mcp:playwright"
#   boost: -0.3          # 이 항목의 매칭 점수에서 감산
#   context: "백엔드 작업에서 사용자가 반복 제거"
#   last_updated: 2026-04-09
